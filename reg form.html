<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student registration form</title>
</head>
<body>
    <h1>Student Registration form</h1>
    <form>
        <label for="name">Name</label>
        <input id="name" type="text" name="name" placeholder="Enter Your Name" required>
        <br><br>

        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="Enter Email" required>
        <br><br>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter Password" required>
        <br><br>
        <label for="age">Age</label>
        <input id="age" type="number" name="age" placeholder="Enter Age" required>
        <br><br>
        <label>Gender</label>
        <br><br>
        <input id="female" type="radio" name="gender">
        <label for="female">Female</label>
         <input id="male" type="radio" name="gender">\
         <label for="male">Male</label>
          <input id="others" type="radio" name="gender">
          <label for="others">Others</label>
        <br><br>
        <label for="phone">Phone Number</label>
        <input id="phone" type="tel" name="phone" placeholder="Enter Phone Number" required>
        <br><br>
        <label for="bday">Date Of Birth</label>
        <input id="bday" type="date" name="bday" required>
        <br><br>
        <label>Hobbies</label>
        <br><br>
        <input id="hobbies1" type="checkbox" name="hobbies">
        <label for="hobbies1">Singing</label>
        <input id="hobbies2" type="checkbox" name="hobbies">
        <label for="hobbies2">Dancing</label>
        <input id="hobbies3" type="checkbox" name="hobbies">
        <label for="hobbies3">Reading</label>
        <input id="hobbies4" type="checkbox" name="hobbies">
        <label for="hobbies4">Drawing</label>
        <br><br>
        <label for="add">Address</label>
        <input id="add" type="text"  name="add" required>
        <br><br>
        
        <input id="button" type="submit" value="registration">
       

        


    </form>
</body>
</html>
